name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: verify (JDK ${{ matrix.jdk }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        jdk: ['17', '21', '22']
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
          cache: maven

      - name: Build and verify
        run: ./mvnw -B -ntp verify

      # Guard the JDK-gating profiles: a module wrongly *included* on the wrong JDK fails to
      # compile, but a module wrongly *excluded* (a typo in a <jdk> range) would leave the reactor
      # smaller while verify still exits 0. Assert the built module set matches the JDK.
      - name: Assert JDK-gated module set
        shell: bash
        run: |
          built() { test -n "$(find "$1/target" -maxdepth 1 -name '*.jar' 2>/dev/null)"; }
          case "${{ matrix.jdk }}" in
            17)
              built rift-java-embedded && { echo "rift-java-embedded must NOT build on JDK 17"; exit 1; }
              built rift-java-embedded-jdk21 && { echo "rift-java-embedded-jdk21 must NOT build on JDK 17"; exit 1; }
              ;;
            21)
              built rift-java-embedded-jdk21 || { echo "rift-java-embedded-jdk21 must build on JDK 21"; exit 1; }
              built rift-java-embedded && { echo "rift-java-embedded must NOT build on JDK 21"; exit 1; }
              ;;
            22)
              built rift-java-embedded || { echo "rift-java-embedded must build on JDK 22"; exit 1; }
              built rift-java-embedded-jdk21 && { echo "rift-java-embedded-jdk21 must NOT build on JDK 22"; exit 1; }
              ;;
          esac
          echo "JDK ${{ matrix.jdk }} built the expected module set."

  # Continuously exercise the release assembly (sources + javadoc + central-publishing plugin load)
  # so a regression in the publish path is caught on every push/PR, not at the next real deploy.
  # GPG signing and the actual deploy need secrets and run only in publish.yml.
  release-smoke:
    name: release assembly (dry, JDK 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Package with the release profile (no signing, no deploy)
        # Include natives-bundle so a broken natives assembly (fetch, sha256, classifier jar wiring,
        # or a manifest/platform drift) is caught on every push/PR, not at the next real deploy.
        run: ./mvnw -B -ntp -Prelease,natives-bundle -DskipTests -Dgpg.skip=true package

  # The Docker-enabled lane for rift-java-testcontainers: RIFT_IT=1 un-gates the RiftContainer
  # round-trip ITs (they self-skip everywhere else). ubuntu-latest runners ship a Docker daemon.
  testcontainers-it:
    name: testcontainers ITs (Docker, JDK 17)
    runs-on: ubuntu-latest
    env:
      RIFT_IT: '1'
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run RiftContainer integration tests against Docker
        run: ./mvnw -B -ntp -pl rift-java-testcontainers -am test

  # The conformance gate: replays the engine's published SDK conformance corpus over each supported
  # transport (parse fidelity + DSL expressibility + engine _verify replay). The corpus is version-
  # locked to the pinned engine (rift.engine.version). RIFT_IT=1 un-gates the replay; CONFORMANCE_
  # TRANSPORT selects it (SPAWN downloads the engine binary; EMBEDDED runs it in-process over FFM and
  # so each embedded lane fetches its platform's librift_ffi and exposes it via RIFT_FFI_LIB).
  # Windows stays experimental (continue-on-error) until it is green for two consecutive weeks.
  conformance:
    name: conformance (${{ matrix.lane.transport }} / ${{ matrix.lane.os }} JDK ${{ matrix.lane.jdk }})
    runs-on: ${{ matrix.lane.os }}
    continue-on-error: ${{ matrix.lane.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        lane:
          - { os: ubuntu-latest, jdk: '17', transport: SPAWN }                          # M1 gate
          - { os: ubuntu-latest, jdk: '22', transport: EMBEDDED }                       # M2 gate
          - { os: ubuntu-latest, jdk: '21', transport: EMBEDDED }                       # M2 gate (preview FFM)
          - { os: macos-14, jdk: '22', transport: EMBEDDED }                            # M2 gate (darwin-aarch64)
          - { os: windows-latest, jdk: '22', transport: EMBEDDED, experimental: true }  # experimental
    env:
      RIFT_IT: '1'
      CONFORMANCE_TRANSPORT: ${{ matrix.lane.transport }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK ${{ matrix.lane.jdk }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.lane.jdk }}
          cache: maven
      - name: Download the version-locked conformance corpus
        shell: bash
        run: |
          set -euo pipefail
          VER="$(./mvnw -q -N help:evaluate -Dexpression=rift.engine.version -DforceStdout)"
          echo "Pinned engine/corpus version: v${VER}"
          mkdir -p rift-java-conformance/target/corpus
          # Download + extract via workspace-relative paths (under the gitignored target/). A
          # ${RUNNER_TEMP} path on Windows starts with a drive letter (D:\...), which GNU tar in Git
          # bash parses as a host:path remote spec ("Cannot connect to D") and fails the whole lane.
          curl -fsSL -o rift-java-conformance/target/sdk-conformance.tar.gz \
            "https://github.com/achird-labs/rift/releases/download/v${VER}/sdk-conformance-v${VER}.tar.gz"
          tar -xzf rift-java-conformance/target/sdk-conformance.tar.gz -C rift-java-conformance/target/corpus
          # Point at the parent dir; Corpus.descend() resolves the single extracted sdk-conformance-* child,
          # so this survives a change to the tarball's top-level directory name.
          echo "RIFT_CORPUS_ROOT=$(pwd)/rift-java-conformance/target/corpus" >> "$GITHUB_ENV"
      - name: Fetch the platform librift_ffi (embedded lanes)
        if: matrix.lane.transport == 'EMBEDDED'
        shell: bash
        run: |
          set -euo pipefail
          VER="$(./mvnw -q -N help:evaluate -Dexpression=rift.engine.version -DforceStdout)"
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64)   ASSET="librift_ffi-linux-x86_64.so" ;;
            macOS-ARM64) ASSET="librift_ffi-darwin-aarch64.dylib" ;;
            macOS-X64)   ASSET="librift_ffi-darwin-x86_64.dylib" ;;
            Windows-X64) ASSET="librift_ffi-windows-x86_64.dll" ;;
            *) echo "no librift_ffi asset for ${RUNNER_OS}-${RUNNER_ARCH}"; exit 1 ;;
          esac
          curl -fsSL -o "${RUNNER_TEMP}/${ASSET}" \
            "https://github.com/achird-labs/rift/releases/download/v${VER}/${ASSET}"
          echo "RIFT_FFI_LIB=${RUNNER_TEMP}/${ASSET}" >> "$GITHUB_ENV"
      - name: Replay the corpus over the ${{ matrix.lane.transport }} transport
        shell: bash
        run: ./mvnw -B -ntp -pl rift-java-conformance -am verify
