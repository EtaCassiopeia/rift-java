# Keeps <rift.engine.version> (and its drift-catcher literals) in sync with the latest
# EtaCassiopeia/rift release. Thin caller of the reusable dep-bump scaffold — all the invariant logic
# (poll / compare / idempotent branch+PR / injection-safe changelog / dry-run) lives in
# ./.github/workflows/dep-bump.yml, and all the rift-java-specific edits live in scripts/bump.sh. A
# real "chore/engine-<version>" PR only appears when EtaCassiopeia/rift has published a newer release.

name: Engine Bump

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do everything except push the branch / open the PR; just log what would happen"
        type: boolean
        default: false
  schedule:
    # Weekly: Monday 06:00 UTC.
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    uses: ./.github/workflows/dep-bump.yml
    with:
      upstream_repo: EtaCassiopeia/rift
      branch_prefix: chore/engine-
      dep_name: rift engine
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
