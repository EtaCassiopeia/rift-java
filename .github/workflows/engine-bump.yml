# Keeps <rift.engine.version> in pom.xml in sync with the latest EtaCassiopeia/rift release.
#
# That property is the single source of truth for the pinned rift engine version: it backs the
# natives fetch (rift-java-natives), the embedded spawn default, and the version preflight check.
# This workflow does NOT bump anything by itself unless EtaCassiopeia/rift has actually published a
# release newer than the version currently pinned in pom.xml — a real "chore/engine-<version>" PR
# only appears when that condition is true. Otherwise every run is a same-day no-op that just logs
# "up to date" and exits cleanly, on both the weekly schedule and manual dispatch.
#
# Manual dispatch accepts a `dry_run` input: when true, the workflow does every read/compare/branch/
# commit step locally but stops short of pushing the branch or opening the PR, logging what it would
# have done instead. That makes "dry-run green on manual dispatch" verifiable without waiting for an
# upstream release.

name: Engine Bump

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do everything except push the branch / open the PR; just log what would happen"
        type: boolean
        default: false
  schedule:
    # Weekly: Monday 06:00 UTC.
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  UPSTREAM_REPO: EtaCassiopeia/rift

jobs:
  engine-bump:
    name: Check for a newer rift engine release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve dry-run flag
        id: flags
        shell: bash
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "Dry run: ${DRY_RUN}"

      - name: Determine latest upstream release and current pin
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          if ! gh auth status >/dev/null 2>&1; then
            echo "gh is not authenticated (GITHUB_TOKEN missing/invalid) — cannot query releases."
            exit 1
          fi

          RELEASE_JSON="$(gh release view --repo "${UPSTREAM_REPO}" --json tagName,body)"
          TAG_NAME="$(echo "${RELEASE_JSON}" | jq -r '.tagName')"
          if [ -z "${TAG_NAME}" ] || [ "${TAG_NAME}" = "null" ]; then
            echo "Could not resolve a latest release tag for ${UPSTREAM_REPO}."
            exit 1
          fi
          LATEST="${TAG_NAME#v}"

          CURRENT="$(grep -oP '(?<=<rift\.engine\.version>)[^<]+' pom.xml | head -n1)"
          if [ -z "${CURRENT}" ]; then
            echo "Could not read <rift.engine.version> from pom.xml."
            exit 1
          fi

          echo "Latest upstream release: ${LATEST} (tag ${TAG_NAME})"
          echo "Current pinned version:  ${CURRENT}"

          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          # Multiline changelog excerpt, truncated so it fits comfortably in a PR body.
          BODY="$(echo "${RELEASE_JSON}" | jq -r '.body // ""' | head -c 4000)"
          # Randomized heredoc delimiter so a release-body line can't spoof the terminator
          # (the documented GitHub Actions multiline-output-injection vector).
          DELIM="ENGINE_BUMP_BODY_$(openssl rand -hex 8)"
          {
            echo "body<<${DELIM}"
            echo "${BODY}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        shell: bash
        run: |
          set -euo pipefail
          LATEST="${{ steps.versions.outputs.latest }}"
          CURRENT="${{ steps.versions.outputs.current }}"

          if [ "${LATEST}" = "${CURRENT}" ]; then
            echo "Up to date (current=${CURRENT}, latest=${LATEST}). Nothing to do."
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SMALLEST="$(printf '%s\n%s\n' "${CURRENT}" "${LATEST}" | sort -V | head -n1)"
          if [ "${SMALLEST}" = "${LATEST}" ]; then
            echo "Latest release (${LATEST}) is not newer than current (${CURRENT}). Nothing to do."
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "A newer engine release is available: ${CURRENT} -> ${LATEST}."
          echo "should_bump=true" >> "$GITHUB_OUTPUT"

      - name: Check for an existing branch or PR
        id: existing
        if: steps.compare.outputs.should_bump == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="chore/engine-${{ steps.versions.outputs.latest }}"

          EXISTS=false
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists on origin."
            EXISTS=true
          fi

          PR_COUNT="$(gh pr list --repo "${{ github.repository }}" --head "${BRANCH}" --state open --json number --jq 'length')"
          if [ "${PR_COUNT}" -gt 0 ]; then
            echo "An open PR already targets branch ${BRANCH}."
            EXISTS=true
          fi

          if [ "${EXISTS}" = "true" ]; then
            echo "Idempotent no-op: branch/PR for ${BRANCH} already present."
          fi

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "exists=${EXISTS}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        if: steps.compare.outputs.should_bump == 'true' && steps.existing.outputs.exists == 'false'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Bump rift.engine.version and open a PR
        if: steps.compare.outputs.should_bump == 'true' && steps.existing.outputs.exists == 'false'
        shell: bash
        env:
          LATEST: ${{ steps.versions.outputs.latest }}
          CURRENT: ${{ steps.versions.outputs.current }}
          BRANCH: ${{ steps.existing.outputs.branch }}
          DRY_RUN: ${{ steps.flags.outputs.dry_run }}
          CHANGELOG: ${{ steps.versions.outputs.body }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          # <rift.engine.version> is the source of truth, but a few files hard-code the pinned version
          # as drift-catchers (a testcontainers test asserts the resolved version + proxy image tag; the
          # conformance README shows the corpus path). Bump all of them together so the auto-PR is
          # self-consistent and green, instead of leaving those literals stale for a human to fix.
          RIFT_CONTAINER_TEST="rift-java-testcontainers/src/test/java/io/github/etacassiopeia/rift/testcontainers/RiftContainerTest.java"
          CONFORMANCE_README="rift-java-conformance/README.md"

          # Replace only the value inside <rift.engine.version>...</rift.engine.version>; every
          # other <...version> property in pom.xml is left untouched.
          sed -i "s|<rift.engine.version>${CURRENT}</rift.engine.version>|<rift.engine.version>${LATEST}</rift.engine.version>|" pom.xml
          # The ENGINE_VERSION assertion and the proxy image tag (anchored so unrelated strings can't match).
          sed -i "s|assertEquals(\"${CURRENT}\", RiftContainer.ENGINE_VERSION|assertEquals(\"${LATEST}\", RiftContainer.ENGINE_VERSION|" "${RIFT_CONTAINER_TEST}"
          sed -i "s|zainalpour/rift-proxy:v${CURRENT}|zainalpour/rift-proxy:v${LATEST}|g" "${RIFT_CONTAINER_TEST}"
          # The version-locked conformance corpus path (all occurrences).
          sed -i "s|sdk-conformance-v${CURRENT}|sdk-conformance-v${LATEST}|g" "${CONFORMANCE_README}"

          # Fail loudly if any target still carries the old version (a rename/format drift would otherwise
          # ship a half-bumped, red PR).
          if grep -q "<rift.engine.version>${CURRENT}</rift.engine.version>" pom.xml \
             || grep -q "\"${CURRENT}\", RiftContainer.ENGINE_VERSION" "${RIFT_CONTAINER_TEST}" \
             || grep -q "rift-proxy:v${CURRENT}" "${RIFT_CONTAINER_TEST}" \
             || grep -q "sdk-conformance-v${CURRENT}" "${CONFORMANCE_README}"; then
            echo "Failed to fully bump ${CURRENT} -> ${LATEST}; some version-tracking literal was not updated."
            exit 1
          fi

          git add pom.xml "${RIFT_CONTAINER_TEST}" "${CONFORMANCE_README}"
          git commit \
            -m "chore(deps): bump rift engine to ${LATEST}" \
            -m "Bumps <rift.engine.version> in pom.xml (the source of truth for the natives fetch, embedded spawn default, and version preflight) plus the version-tracking literals in RiftContainerTest and the conformance README, so the PR is self-consistent."

          PR_TITLE="chore(deps): bump rift engine to ${LATEST}"

          # Build the PR body in a temp file rather than a heredoc: this run step is embedded in an
          # indented YAML block scalar, and a heredoc terminator here would not reliably land at
          # column 0, which breaks heredoc parsing.
          PR_BODY_FILE="$(mktemp)"
          {
            printf 'Bumps the pinned rift engine version from `%s` to `%s`, tracked by\n' "${CURRENT}" "${LATEST}"
            printf '`<rift.engine.version>` in `pom.xml` (natives fetch, embedded spawn default, version\n'
            printf 'preflight).\n\n'
            printf '### Upstream release notes (EtaCassiopeia/rift %s)\n\n' "${LATEST}"
            printf '%s\n\n' "${CHANGELOG}"
            printf -- '---\n\n'
            printf 'CI and the natives-refresh check must pass before this is merged. Opened automatically by\n'
            printf 'the engine-bump workflow; requires human review -- no auto-merge.\n'
          } > "${PR_BODY_FILE}"

          if [ "${DRY_RUN}" = "true" ]; then
            echo "DRY RUN: would push branch '${BRANCH}' and open a PR titled:"
            echo "  ${PR_TITLE}"
            echo "DRY RUN: PR body would be:"
            cat "${PR_BODY_FILE}"
            exit 0
          fi

          git push origin "${BRANCH}"

          gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ github.event.repository.default_branch || 'master' }}" \
            --head "${BRANCH}" \
            --title "${PR_TITLE}" \
            --body-file "${PR_BODY_FILE}"
