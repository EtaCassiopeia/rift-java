name: Publish

# Releases happen ONLY by pushing a version tag (vX.Y.Z) — mirroring zio-bdd. A push to master
# publishes the -SNAPSHOT instead, which the central-publishing plugin routes to the Central Portal
# snapshots repo (https://central.sonatype.com/repository/maven-snapshots/); SNAPSHOT publishing is
# enabled for the io.github.etacassiopeia namespace in the Portal.
on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    # Only the canonical repo publishes; forks build via CI but never deploy.
    if: github.repository == 'EtaCassiopeia/rift-java'
    permissions:
      contents: write # create the GitHub Release object on a tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check publishing credentials
        id: guard
        env:
          CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          # Require the full credential set; a partial config would red-fail the signing/deploy
          # steps, so skip cleanly instead and tell the maintainer what is missing.
          if [ -n "$CENTRAL_USERNAME" ] && [ -n "$CENTRAL_PASSWORD" ] \
             && [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing credentials incomplete — skipping deploy."
            echo "Configure all of MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD, GPG_PRIVATE_KEY"
            echo "and MAVEN_GPG_PASSPHRASE repository secrets to enable Central deployment."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      # JDK 21 (LTS) builds the zero-dep modules plus the JDK 21 embedded variant. Dual-artifact
      # publishing of the stable JDK 22 embedded jar is refined in #11.
      - name: Set up JDK 21
        if: steps.guard.outputs.deploy == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      # On a tag vX.Y.Z, stamp every module with the release version X.Y.Z so the reactor deploys a
      # RELEASE (not the -SNAPSHOT). A push to master leaves the -SNAPSHOT version untouched.
      - name: Set the release version from the tag
        if: steps.guard.outputs.deploy == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing $VERSION from tag $GITHUB_REF_NAME"
          ./mvnw -B -ntp versions:set -DnewVersion="$VERSION" -DprocessAllModules -DgenerateBackupPoms=false

      - name: Deploy to Maven Central
        if: steps.guard.outputs.deploy == 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: ./mvnw -B -ntp -Prelease -DskipTests deploy

      # Publishing to Central only appears under Tags; create the Release object so a pushed tag also
      # shows under Releases. A pre-release tag (contains a hyphen, e.g. v0.1.0-RC1) is not marked Latest.
      - name: Create the GitHub Release for this tag
        if: steps.guard.outputs.deploy == 'true' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flags="--verify-tag --generate-notes"
          case "${GITHUB_REF_NAME}" in
            *-*) flags="$flags --prerelease" ;;
            *)   flags="$flags --latest" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" $flags

  # After a release tag deploys, advance master's -SNAPSHOT so snapshot builds no longer collide with
  # (or trail) the version just released — the maven equivalent of what sbt-dynver derives for free.
  # The GITHUB_TOKEN push does NOT re-trigger this workflow (GitHub suppresses that), so there is no loop.
  bump-snapshot:
    name: Advance the development version
    needs: publish
    # Only on a FINAL release tag; a pre-release (v1.2.0-RC1) must not push the dev line past 1.2.0.
    if: github.repository == 'EtaCassiopeia/rift-java' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Bump master to the next -SNAPSHOT
        run: |
          set -euo pipefail
          RELEASED="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJ MIN PAT <<< "$RELEASED"
          NEXT="${MAJ}.${MIN}.$((PAT + 1))-SNAPSHOT"
          CURRENT="$(./mvnw -q -N help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "released=$RELEASED current=$CURRENT next=$NEXT"

          # Only advance if NEXT is strictly newer than master's current version, so a manual bump or a
          # workflow re-run on an older tag is never clobbered or reverted (no backward move, no empty commit).
          newest="$(printf '%s\n%s\n' "$CURRENT" "$NEXT" | sort -V | tail -1)"
          if [ "$newest" = "$CURRENT" ]; then
            echo "master is already at $CURRENT (>= $NEXT); nothing to bump."
            exit 0
          fi

          ./mvnw -B -ntp versions:set -DnewVersion="$NEXT" -DprocessAllModules -DgenerateBackupPoms=false

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): set development version to $NEXT"
          git push origin HEAD:master
