name: Publish

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest
    # Only the canonical repo publishes; forks build via CI but never deploy.
    if: github.repository == 'EtaCassiopeia/rift-java'
    steps:
      - uses: actions/checkout@v4

      - name: Check publishing credentials
        id: guard
        env:
          CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          # Require the full credential set; a partial config would red-fail the signing/deploy
          # steps, so skip cleanly instead and tell the maintainer what is missing.
          if [ -n "$CENTRAL_USERNAME" ] && [ -n "$CENTRAL_PASSWORD" ] \
             && [ -n "$GPG_PRIVATE_KEY" ] && [ -n "$GPG_PASSPHRASE" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing credentials incomplete — skipping deploy."
            echo "Configure all of MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD, GPG_PRIVATE_KEY"
            echo "and MAVEN_GPG_PASSPHRASE repository secrets to enable Central deployment."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      # JDK 21 (LTS) builds the zero-dep modules plus the JDK 21 embedded variant. Dual-artifact
      # publishing of the stable JDK 22 embedded jar is refined in #11.
      - name: Set up JDK 21
        if: steps.guard.outputs.deploy == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy
        if: steps.guard.outputs.deploy == 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: ./mvnw -B -ntp -Prelease -DskipTests deploy
