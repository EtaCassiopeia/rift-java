site_name: rift-java
site_description: Official Java SDK for Rift — a Mountebank-compatible HTTP/HTTPS mock server
site_url: https://achird-labs.github.io/rift-java/
repo_url: https://github.com/achird-labs/rift-java
repo_name: achird-labs/rift-java
docs_dir: docs
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: { icon: material/brightness-4, name: Switch to light mode }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
nav:
  - Home: index.md
  - Guides:
      - Intercept (TLS-MITM): intercept.md
      - JUnit 5: junit5.md
      - Testcontainers: testcontainers.md
      - Record & replay: recording.md
  - Reference:
      - API design (v1): design/sdk-api.md
